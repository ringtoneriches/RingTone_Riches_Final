<!doctype html>
<html>
<head>
  <style type="text/css">
    @font-face {
      font-family: 'euroFont';
      src: url('fonts/Anton-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    body {
      background-image: url("png/Background_2.png");
      background-color: #0d0005;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      padding: 0px;
      margin: 0px;
      overflow: hidden;
    }
    canvas {
      display: block;
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
  <script src="js/phaser.js"></script>
</head>
<body>
  <script src="js/slotConfigRed3x3_20L.js"></script>
  <script src="js/mkutils.js"></script>
  <script src="js/popups.js"></script>
  <script src="js/state_machine.js"></script>
  <script src="js/slot_classes.js"></script>
  <script src="js/slotGame.js"></script>
  <script>
    (function() {
      try {
        var params = new URLSearchParams(window.location.search);
        var credits = parseInt(params.get('credits') || '0');
        var orderId = params.get('orderId') || '';
        if (credits > 0) slotConfig.defaultCoins = credits;
        if (orderId) window._slotOrderId = orderId;
      } catch(e) {}

      // Forward wheel/scroll events to the parent page so the page stays scrollable
      window.addEventListener('wheel', function(e) {
        if (window.parent && window.parent !== window) {
          window.parent.scrollBy({ top: e.deltaY, left: 0, behavior: 'auto' });
        }
      }, { passive: true });
    })();
  </script>
</body>
</html>
